services:
  faculdade-app:
    build: .
    container_name: faculdade-app
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - faculdade-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro 
    depends_on:
      - faculdade-app
    networks:
      - faculdade-network

networks:
  faculdade-network:
    driver: bridge