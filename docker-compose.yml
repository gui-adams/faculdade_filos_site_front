version: "3.9"

services:
  app:
    build: .
    container_name: faculdade-app
    env_file:
      - .env        # suas variáveis Next (NEXT_PUBLIC_*, etc.)
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: faculdade-nginx
    ports:
      - "80:80"
      # - "443:443"  # se for configurar SSL depois
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
