server {
    listen 80;
    listen 443 ssl;
    server_name faculdadefilos.edu.br www.faculdadefilos.edu.br;

    # Certificados Cloudflare Origin
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Otimização SSL e Segurança
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Ajuste de Timeouts para evitar erro 499 e lentidão
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # Cache de arquivos estáticos (Imagens, CSS, JS)
    # Isso alivia o Next.js e resolve a lentidão nos arquivos .webp
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp)$ {
        proxy_pass http://faculdade-app:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        # Configuração para resolver o erro "host not found in upstream"
        resolver 127.0.0.11 valid=30s;
        set $upstream_app faculdade-app;

        proxy_pass http://$upstream_app:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer de Proxy para lidar com respostas grandes do Next.js
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}