server {
    listen 80;
    listen 443 ssl;
    server_name faculdadefilos.edu.br www.faculdadefilos.edu.br;

    # Certificados Cloudflare Origin
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # --- COMPRESSÃO GZIP (Resolve a lentidão dos payloads RSC) ---
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_comp_level 6;

    # Segurança e Protocolos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Ajustes de Performance e Timeouts (Resolve o erro 499)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Otimização de Buffers para Next.js (Essencial para RSC Payloads grandes)
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Cache de Arquivos Estáticos (Acelera o carregamento de .webp, .png, .js, .css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?)$ {
        proxy_pass http://faculdade-app:3000;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        
        expires 7d;
        add_header Cache-Control "public, no-transform";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Proxy Principal para a Aplicação
    location / {
        # Resolver do Docker para evitar erro de inicialização (restarting)
        resolver 127.0.0.11 valid=30s;
        set $upstream_app faculdade-app;

        proxy_pass http://$upstream_app:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSockets e Conexões Persistentes
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Host $host;
    }
}