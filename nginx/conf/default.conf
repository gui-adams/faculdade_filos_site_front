server {
    listen 80;
    server_name faculdadefilos.edu.br www.faculdadefilos.edu.br;

    # Cabeçalhos de Segurança (Best Practices)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://faculdade-app:3000; # Nome definido no docker-compose
        proxy_set_header Host $host;
        # Estes cabeçalhos passam o IP real do usuário através do Cloudflare
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}